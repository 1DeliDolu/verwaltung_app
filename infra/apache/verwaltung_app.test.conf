<VirtualHost *:80>
    ServerName verwaltung_app.test
    ServerAdmin webmaster@localhost
    DocumentRoot /mnt/d/Code/PHP/verwaltung_app/public

    <Directory /mnt/d/Code/PHP/verwaltung_app/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/verwaltung_app.test-error.log
    CustomLog ${APACHE_LOG_DIR}/verwaltung_app.test-access.log combined
</VirtualHost>
