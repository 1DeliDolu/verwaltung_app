name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_ENV: testing
      APP_DEBUG: "true"
      APP_DEMO_MODE: "true"
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: "1025"
      MAIL_FROM_ADDRESS: probe@verwaltung.demo
      MAIL_FROM_NAME: Verwaltung Probe
      MAIL_TEST_RECIPIENT: admin@verwaltung.demo
      MAIL_AUDIT_REPORT_ADMIN_EMAIL: admin@verwaltung.local
      MAIL_AUDIT_REPORT_RECIPIENTS: admin@verwaltung.demo
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_DATABASE: verwaltung_app
      DB_USERNAME: root
      DB_PASSWORD: root
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: mbstring, pdo_mysql

      - name: Bootstrap test database
        run: php bin/bootstrap-test-database.php

      - name: Run test suite
        run: php tests/run.php
